name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set GOTMPDIR
        run: |
          mkdir -p "${{ github.workspace }}/gotmp"
          echo "GOTMPDIR=${{ github.workspace }}/gotmp" >> "$GITHUB_ENV"

      - name: Build
        run: go build ./cmd/makeslop

      - name: Test
        run: go test -v -timeout=100s ./...

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Set GOTMPDIR
        run: |
          mkdir -p "${{ github.workspace }}/gotmp"
          echo "GOTMPDIR=${{ github.workspace }}/gotmp" >> "$GITHUB_ENV"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
